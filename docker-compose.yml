services:
  # ── FastAPI inference API ──────────────────────────────────────────────────
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./artifacts:/app/artifacts
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000

  # ── Streamlit UI ───────────────────────────────────────────────────────────
  ui:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./artifacts:/app/artifacts
    command: streamlit run src/app/app.py --server.port 8501 --server.address 0.0.0.0
